<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<title>Palm Particle Swarm</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#000; color:#fff; font-family:sans-serif; }
  #scene { position: fixed; inset: 0; z-index: 1; }
  /* Kamera arka planda, mirror'lu */
  #cam { display: none; }
  #status {
    position: fixed; top: 10px; left: 10px; z-index: 10;
    background: rgba(0,0,0,0.55); padding: 8px 12px; border-radius: 6px;
    font-size: 13px; max-width: 80vw;
  }
  #menu {
    position: fixed; top: 50%; right: 10px; transform: translateY(-50%);
    z-index: 10; display: flex; flex-direction: column; gap: 6px;
    opacity: 0.55;
  }
  .mbtn {
    width: 32px; height: 32px; border-radius: 7px;
    background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .mbtn svg { width: 18px; height: 18px; }
  .mbtn.hover {
    border-color: #3ad6ff; box-shadow: 0 0 10px #3ad6ff;
    transform: scale(1.15); opacity: 1;
  }
  .mbtn.active {
    border-color: #ff7a1a; box-shadow: 0 0 12px #ff7a1a;
    background: rgba(255,122,26,0.18);
  }
  .cursor {
    position: fixed; width: 10px; height: 10px; border-radius: 50%;
    background: rgba(58,214,255,0.55); border: 1px solid rgba(255,255,255,0.7);
    pointer-events: none; z-index: 20; transform: translate(-50%,-50%);
    box-shadow: 0 0 8px #3ad6ff; display: none;
  }
</style>
</head>
<body>
<div id="status">Yükleniyor…</div>
<canvas id="proc" style="display:none;"></canvas>
<canvas id="textProbe" style="display:none;"></canvas>
<script>
  window.addEventListener('error', e => {
    document.getElementById('status').textContent = 'JS Hata: ' + (e.message || e.error);
  });
  window.addEventListener('unhandledrejection', e => {
    document.getElementById('status').textContent = 'Promise Hata: ' + (e.reason?.message || e.reason);
  });
</script>
<video id="cam" autoplay playsinline muted></video>
<div id="scene"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/examples/jsm/postprocessing/EffectComposer.js": "https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js",
    "three/examples/jsm/postprocessing/RenderPass.js": "https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/RenderPass.js",
    "three/examples/jsm/postprocessing/UnrealBloomPass.js": "https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js",
    "@mediapipe/tasks-vision": "https://esm.sh/@mediapipe/tasks-vision@0.10.9"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { ParticlesSwarm } from './particlesSwarm.js';
import { HandLandmarker, FilesetResolver } from '@mediapipe/tasks-vision';

const status = document.getElementById('status');
const video = document.getElementById('cam');
const swarm = new ParticlesSwarm(document.getElementById('scene'));
const proc = document.getElementById('proc');
const textProbe = document.getElementById('textProbe');
const tctx = textProbe.getContext('2d', { willReadFrequently: true });

// --- Metni nokta bulutuna çevir (cache'li) ---
const textCache = {};
function getTextPoints(text) {
  if (textCache[text]) return textCache[text];
  const fontPx = 140;
  tctx.font = `900 ${fontPx}px "Segoe UI", sans-serif`;
  const w = Math.ceil(tctx.measureText(text).width) + 30;
  const h = Math.ceil(fontPx * 1.5);
  textProbe.width = w;
  textProbe.height = h;
  tctx.font = `900 ${fontPx}px "Segoe UI", sans-serif`;
  tctx.fillStyle = '#fff';
  tctx.textBaseline = 'middle';
  tctx.fillText(text, 15, h / 2);
  const data = tctx.getImageData(0, 0, w, h).data;
  const pts = [];
  const step = 3;
  for (let y = 0; y < h; y += step) {
    for (let x = 0; x < w; x += step) {
      if (data[(y * w + x) * 4 + 3] > 128) {
        pts.push({ x: (x - w / 2) / fontPx, y: -(y - h / 2) / fontPx });
      }
    }
  }
  textCache[text] = pts;
  return pts;
}
const pctx = proc.getContext('2d', { willReadFrequently: true });

// --- Profesyonel ışık dengeleme (adaptif gamma + CLAHE-light) ---
let curGamma = 1.0, curBright = 1.0, curContrast = 1.0;
function adaptLighting() {
  // Küçük örnekleme ile ortalama luma
  const w = 64, h = 36;
  pctx.drawImage(video, 0, 0, w, h);
  const data = pctx.getImageData(0, 0, w, h).data;
  let sum = 0;
  for (let i = 0; i < data.length; i += 4) {
    sum += 0.2126 * data[i] + 0.7152 * data[i+1] + 0.0722 * data[i+2];
  }
  const meanLuma = sum / (data.length / 4) / 255; // 0..1
  // Hedef luma 0.5 → uzaklığa göre gamma/brightness/contrast
  const targetGamma = meanLuma < 0.35 ? 0.55 + meanLuma : meanLuma > 0.7 ? 1.4 : 1.0;
  const targetBright = meanLuma < 0.3 ? 1.35 : meanLuma > 0.75 ? 0.85 : 1.0;
  const targetContrast = meanLuma < 0.4 ? 1.25 : 1.1;
  // Yumuşak geçiş (flicker engelle)
  curGamma += (targetGamma - curGamma) * 0.08;
  curBright += (targetBright - curBright) * 0.08;
  curContrast += (targetContrast - curContrast) * 0.08;
}

function drawProcessed() {
  proc.width = video.videoWidth;
  proc.height = video.videoHeight;
  // CSS filter: brightness + contrast + saturate (gamma yaklaşımı)
  pctx.filter = `brightness(${curBright}) contrast(${curContrast}) saturate(1.1)`;
  pctx.drawImage(video, 0, 0, proc.width, proc.height);
  pctx.filter = 'none';
}

// Video'yu sahnenin arka planı yap (mirror'lı)
function attachVideoBackground() {
  const tex = new THREE.VideoTexture(video);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  // Mirror için U eksenini ters çevir
  tex.wrapS = THREE.RepeatWrapping;
  tex.repeat.x = -1;
  tex.offset.x = 1;
  swarm.scene.background = tex;
}

window.addEventListener('resize', () => {
  swarm.camera.aspect = window.innerWidth / window.innerHeight;
  swarm.camera.updateProjectionMatrix();
  swarm.renderer.setSize(window.innerWidth, window.innerHeight);
  swarm.composer.setSize(window.innerWidth, window.innerHeight);
});

// --- Kamera ---
async function initCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { width: 1280, height: 720, facingMode: 'user' }, audio: false
  });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
}

// --- MediaPipe HandLandmarker ---
async function initHands() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm"
  );
  return await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU"
    },
    runningMode: "VIDEO",
    numHands: 2,
    minHandDetectionConfidence: 0.4,
    minHandPresenceConfidence: 0.4,
    minTrackingConfidence: 0.4
  });
}

// Normalleştirilmiş kamera koordinatlarını three.js dünya koordinatına çevir
// Kamera z=100, fov=60 → z=0 düzleminde görünür yükseklik:
function normalizedToWorld(nx, ny, depth = 0) {
  const cam = swarm.camera;
  const distance = cam.position.z - depth; // 100
  const vFov = (cam.fov * Math.PI) / 180;
  const height = 2 * Math.tan(vFov / 2) * distance;
  const width = height * cam.aspect;
  // x: aynalı (selfie), 0..1 → -w/2..w/2
  const wx = (0.5 - nx) * width; // mirror
  const wy = (0.5 - ny) * height;
  return { x: wx, y: wy };
}

(async () => {
  try {
    status.textContent = 'Kamera izni isteniyor…';
    await initCamera();
    attachVideoBackground();
    status.textContent = 'El tanıma modeli indiriliyor…';
    const landmarker = await initHands();
    status.textContent = 'Hazır ✓ Avucunu kameraya göster';
    // status'u açık bırak, debug için

    let lastVideoTime = -1;

    // --- Şekil menüsü hover kontrolü (iki parmak) ---
    const cursorEls = [document.getElementById('cursor0'), document.getElementById('cursor1')];
    const menuBtns = Array.from(document.querySelectorAll('.mbtn'));
    let activeShape = null;
    let hoverShape = null;
    let hoverStart = 0;
    const HOVER_HOLD_MS = 600;
    function updateMenu(fingers) {
      // fingers: [{x,y} | null, {x,y} | null]
      let hit = null;
      for (let i = 0; i < 2; i++) {
        const f = fingers[i];
        const el = cursorEls[i];
        if (!f) { el.style.display = 'none'; continue; }
        el.style.display = 'block';
        el.style.left = f.x + 'px';
        el.style.top = f.y + 'px';
        for (const b of menuBtns) {
          const r = b.getBoundingClientRect();
          if (f.x >= r.left && f.x <= r.right && f.y >= r.top && f.y <= r.bottom) {
            hit = b.dataset.shape;
          }
        }
      }
      menuBtns.forEach(b => b.classList.toggle('hover', b.dataset.shape === hit));
      const now = performance.now();
      if (hit !== hoverShape) {
        hoverShape = hit;
        hoverStart = now;
      } else if (hit && now - hoverStart > HOVER_HOLD_MS) {
        if (activeShape !== hit) {
          activeShape = hit;
          menuBtns.forEach(b => b.classList.toggle('active', b.dataset.shape === activeShape));
          swarm.setShape(activeShape);
        }
      }
    }

    // --- Jest yardımcıları ---
    function isFist(lm) {
      // Parmak ucu (8,12,16,20) bilek (0)'a, MCP (5,9,13,17)'den daha yakın olmalı
      const tips = [8, 12, 16, 20], mcps = [5, 9, 13, 17];
      const wrist = lm[0];
      let folded = 0;
      for (let i = 0; i < 4; i++) {
        const tip = lm[tips[i]], mcp = lm[mcps[i]];
        const dTip = Math.hypot(tip.x - wrist.x, tip.y - wrist.y);
        const dMcp = Math.hypot(mcp.x - wrist.x, mcp.y - wrist.y);
        if (dTip < dMcp * 1.05) folded++;
      }
      return folded >= 3;
    }
    function isHeart(lmA, lmB) {
      // İki elin baş + işaret parmağı uçları birbirine yakın → kalp
      const t1 = lmA[4], t2 = lmB[4];   // başparmaklar
      const i1 = lmA[8], i2 = lmB[8];   // işaret
      const dT = Math.hypot(t1.x - t2.x, t1.y - t2.y);
      const dI = Math.hypot(i1.x - i2.x, i1.y - i2.y);
      // Aynı zamanda eller yatayda yakın olmalı
      return dT < 0.10 && dI < 0.12;
    }

    function loop() {
      if (video.readyState >= 2 && video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;

        // Işık dengeleme + ön işleme
        adaptLighting();
        drawProcessed();

        const res = landmarker.detectForVideo(proc, performance.now());
        const handsOut = [];
        const allLms = res.landmarks || [];
        const heartNow = allLms.length >= 2 && isHeart(allLms[0], allLms[1]);
        if (allLms.length > 0) {
          for (let hi = 0; hi < allLms.length; hi++) {
            const lm = allLms[hi];
            const handed = res.handedness?.[hi]?.[0]?.categoryName || (hi === 0 ? 'Left' : 'Right');
            // Kamera mirror'lı: MediaPipe "Left" gerçekte sağ el; tema seçimi için ters çevir
            const theme = handed === 'Left' ? 'fire' : 'water';

            // --- Sticky etiket: jest devam ettiği sürece neon yazı kalır ---
            let label = null;
            if (heartNow) label = 'Esma';
            else if (isFist(lm)) label = theme === 'fire' ? 'Ilgaz' : 'Zeynep';

            // 21 landmark'ı dünya koordinatına çevir
            const points = lm.map(p => {
              const w = normalizedToWorld(p.x, p.y);
              return { x: w.x, y: w.y, z: -p.z * 60 };
            });

            // El boyutu (bilek↔orta parmak kökü dünya mesafesi)
            const dx = points[0].x - points[9].x;
            const dy = points[0].y - points[9].y;
            const size = Math.max(4, Math.hypot(dx, dy));

            handsOut.push({ points, theme, size, label });
          }
        }
        // Kalp merkezi (iki el ortası, dünya koordinatı)
        if (heartNow) {
          const mx = (allLms[0][9].x + allLms[1][9].x) / 2;
          const my = (allLms[0][9].y + allLms[1][9].y) / 2;
          const w = normalizedToWorld(mx, my);
          swarm.setHeart({ x: w.x, y: w.y, z: 0 });
        } else {
          swarm.setHeart(null);
        }
        swarm.setHands(handsOut);

      }
      requestAnimationFrame(loop);
    }
    loop();
  } catch (err) {
    status.textContent = 'Hata: ' + err.message;
    console.error(err);
  }
})();
</script>
</body>
</html>
